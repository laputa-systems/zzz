name: build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            target: x86_64-linux-musl
            cpu: x86_64_v3
          - arch: aarch64
            target: aarch64-linux-musl
            cpu: cortex_a53

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache zig
        id: cache-zig
        uses: actions/cache@v4
        with:
          path: zig-x86_64-linux-0.16.0
          key: zig-0.16.0

      - if: steps.cache-zig.outputs.cache-hit != 'true'
        name: Download zig
        run: curl -fsSL https://ziglang.org/download/0.16.0/zig-x86_64-linux-0.16.0.tar.xz | tar xJ

      - run: echo "$PWD/zig-x86_64-linux-0.16.0" >> "$GITHUB_PATH"

      - run: zig version

      - name: Build zzz
        run: make TARGET=${{ matrix.target }} CPU=${{ matrix.cpu }}

      - name: Rename binary
        run: mv zzz zzz-linux-musl-static-${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: zzz-${{ matrix.arch }}
          path: zzz-linux-musl-static-${{ matrix.arch }}
          if-no-files-found: error

  release:
    name: Create pre-release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create pre-release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: release-${{ github.sha }}
        run: |
          gh release create "$RELEASE_TAG" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --prerelease \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TAG"
